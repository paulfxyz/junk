name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ────────────────────────────────────────
  #  macOS arm64 (Apple Silicon)
  # ────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Build ICNS
        run: iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build unpacked .app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
        run: |
          npx electron-builder --mac dir --arm64 --publish never \
            --config.mac.identity=null \
            --config.mac.gatekeeperAssess=false

      - name: Ad-hoc sign
        run: |
          APP=$(find dist/mac-arm64 -name "*.app" -maxdepth 1 | head -1)
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) | \
            while read f; do codesign --force --sign - "$f" 2>/dev/null || true; done
          find "$APP" -name "*.framework" | \
            while read f; do codesign --force --deep --sign - "$f" 2>/dev/null || true; done
          codesign --force --deep --sign - --options runtime --timestamp=none "$APP"

      - name: Package DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
        run: |
          npx electron-builder --mac dmg --arm64 --publish never \
            --config.mac.identity=null \
            --config.mac.gatekeeperAssess=false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/*arm64.dmg

  # ────────────────────────────────────────
  #  macOS x64 (Intel)
  # ────────────────────────────────────────
  build-mac-x64:
    name: macOS x64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Build ICNS
        run: iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build unpacked .app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
        run: |
          npx electron-builder --mac dir --x64 --publish never \
            --config.mac.identity=null \
            --config.mac.gatekeeperAssess=false

      - name: Ad-hoc sign
        run: |
          APP=$(find dist -name "*.app" -maxdepth 2 | head -1)
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) | \
            while read f; do codesign --force --sign - "$f" 2>/dev/null || true; done
          find "$APP" -name "*.framework" | \
            while read f; do codesign --force --deep --sign - "$f" 2>/dev/null || true; done
          codesign --force --deep --sign - --options runtime --timestamp=none "$APP"

      - name: Package DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
        run: |
          npx electron-builder --mac dmg --x64 --publish never \
            --config.mac.identity=null \
            --config.mac.gatekeeperAssess=false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            dist/*.dmg
            !dist/*arm64.dmg

  # ────────────────────────────────────────
  #  Windows x64
  # ────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Build Windows installer + portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-builder --win nsis portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe

  # ────────────────────────────────────────
  #  Linux x64
  # ────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rpm fakeroot dpkg libarchive-tools \
            libgtk-3-0 libnotify4 libnss3 libxss1 \
            libxtst6 xauth xvfb

      - name: Build AppImage + deb
        run: |
          npx electron-builder --linux AppImage deb --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb

  # ────────────────────────────────────────
  #  Publish GitHub Release
  # ────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-mac-arm64, build-mac-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with: { name: mac-arm64, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: mac-x64, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: windows, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: linux, path: dist }

      - name: List all assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: Junk ${{ github.ref_name }}
          body: |
            ## Junk ${{ github.ref_name }}

            A flying scratchpad. One shortcut. No chrome. No cloud.

            ### macOS (Apple Silicon)
            ```bash
            # After dragging Junk.app to /Applications:
            xattr -rd com.apple.quarantine /Applications/Junk.app
            open /Applications/Junk.app
            ```
            Then hit **⌘J** from anywhere.

            ### macOS (Intel)
            Same steps, use the `x64` DMG.

            ### Windows
            Run the `.exe` installer, then hit **Ctrl+J** from anywhere.

            ### Linux
            ```bash
            chmod +x Junk-*.AppImage && ./Junk-*.AppImage
            ```
            Then hit **Ctrl+J** from anywhere.
          files: dist/*
          draft: false
          prerelease: false
