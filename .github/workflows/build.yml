name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-14        # Apple Silicon (M1) runner — builds universal binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # electron-builder needs iconutil to convert .iconset → .icns
      # macOS runners have it pre-installed.
      - name: Build ICNS from iconset
        run: |
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build DMG (arm64 + x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing is skipped (no certificate). Users bypass with:
          # xattr -rd com.apple.quarantine /Applications/Junk.app
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: List output
        run: ls -lh dist/

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: junk-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Junk ${{ github.ref_name }}
          body: |
            ## Junk ${{ github.ref_name }}

            A flying macOS scratchpad. Hit **⌘J** anywhere, type or paste, hit **Esc** to dismiss. Content is auto-saved.

            ### Install
            1. Download the `.dmg` for your Mac:
               - **Apple Silicon (M1/M2/M3/M4):** `Junk-*-arm64.dmg`
               - **Intel Mac:** `Junk-*-x64.dmg`
            2. Open the `.dmg`, drag **Junk.app** to `/Applications`
            3. First launch: right-click → **Open** → **Open** (Gatekeeper bypass for unsigned apps)

            Or via Terminal:
            ```bash
            xattr -rd com.apple.quarantine /Applications/Junk.app
            ```
          files: dist/*.dmg
          draft: false
          prerelease: false
