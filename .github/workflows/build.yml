# ─────────────────────────────────────────────────────────────────────────────
# Junk — GitHub Actions CI / Release workflow
# ─────────────────────────────────────────────────────────────────────────────
#
# This workflow does two things:
#
#   1. On every push to `main` and every pull request → build all three
#      platforms and upload the artefacts for inspection (smoke-test CI).
#
#   2. On every tag push matching `v*` (e.g. v1.6.0) → after all three platform
#      builds succeed, the `release` job collects their artefacts and publishes
#      a GitHub Release with the binaries attached.
#
# Platform matrix:
#   macOS  → .dmg (universal binary: arm64 + x86_64)
#   Windows → .exe (NSIS installer) + .msi (WiX)
#   Linux  → .AppImage + .deb
#
# Why universal binary on macOS?
#   Apple Silicon (M1/M2/M3) Macs can run x86_64 code via Rosetta, but a
#   universal binary runs native on both architectures. Tauri v2 supports
#   universal builds via `--target universal-apple-darwin` which lipo-merges
#   two separate compilations. The build time roughly doubles but the resulting
#   .dmg works on any Mac from 2012 to present.
#
# Why ad-hoc signing on macOS?
#   Full notarisation requires an Apple Developer account ($99/yr) and secrets.
#   Ad-hoc signing (codesign -s -) satisfies Gatekeeper enough for users who
#   trust the source and run `xattr -dr com.apple.quarantine Junk.app`. The
#   README explains this clearly.
#
# Caching strategy:
#   We cache the Rust compilation artefacts (target/) and the cargo registry
#   (.cargo) separately. The cargo registry is keyed on Cargo.lock; target/
#   is keyed on the full dependency hash. This reduces rebuild time from ~8
#   minutes to ~2 minutes on a warm cache.
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Build jobs ─────────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # macOS — universal binary (.dmg)
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Rust stable
      #    We pin to "stable" rather than a specific version so we always get
      #    the latest stable compiler. rustup is pre-installed on GitHub runners.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets are needed for the universal binary
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # 3. Cache Cargo registry and compilation artefacts
      #    Key on Cargo.lock so a lockfile change invalidates the cache.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      # 4. Install Node.js 20 (LTS) — required for @tauri-apps/cli
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install JS dependencies (only @tauri-apps/cli in devDependencies)
      - name: Install JS deps
        run: npm ci

      # 6. Build universal macOS bundle
      #    --target universal-apple-darwin tells Tauri to compile twice
      #    (once per arch) then merge with lipo. --bundles dmg limits
      #    output to a single .dmg file (no redundant .app.tar.gz).
      - name: Build (universal DMG)
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg

      # 7. Ad-hoc sign the app bundle
      #    Without a Developer ID certificate we can't notarise, but ad-hoc
      #    signing at least satisfies codesign's structural requirements.
      #    Users need to run `xattr -dr com.apple.quarantine Junk.app` — this
      #    is documented in the README.
      - name: Ad-hoc sign
        run: |
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep --sign - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          fi

      # 8. Upload the .dmg as a workflow artefact
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Junk-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Windows — NSIS installer + MSI
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            src-tauri\target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      # WebView2 is pre-installed on windows-latest runners (Windows 11 image)
      # so we don't need the bootstrapper step here. If you target Windows 10
      # machines that might not have WebView2, the tauri.conf.json setting
      # webviewInstallMode: downloadBootstrapper handles it at install time.
      - name: Build (NSIS + MSI)
        run: npm run tauri build -- --bundles nsis,msi

      # Upload both installer formats so users can choose
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Junk-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Junk-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Linux — AppImage + .deb
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Linux requires several system libraries for Tauri's WebView (WebKitGTK)
      # and window management. These are NOT available on the GitHub runner by
      # default; we install them explicitly.
      #
      # Key packages:
      #   libwebkit2gtk-4.1-dev  — WebKitGTK (the WebView engine on Linux)
      #   libgtk-3-dev           — GTK3 for native window chrome
      #   libayatana-appindicator3-dev — tray icon support (not used in Junk
      #                                  but required by Tauri's build)
      #   libxdo-dev             — X11 automation (needed by global shortcuts)
      #   libssl-dev             — TLS (for rustls-tls alternative)
      #   build-essential        — gcc, make, pkg-config
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install JS deps
        run: npm ci

      - name: Build (AppImage + deb)
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Junk-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: Junk-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Release — collect all artefacts and publish to GitHub Releases
  #
  # This job only runs on tag pushes (v*). It waits for all three platform
  # builds to complete successfully before running.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    # Only run on version tags — not on branch pushes or PRs
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Required for creating a GitHub Release and uploading assets
    permissions:
      contents: write

    steps:
      - name: Checkout (for tag message)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so we can generate a changelog

      # Download all platform artefacts into a flat `dist/` directory
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release files
        run: find dist/ -type f | sort

      # Upload artifacts to the GitHub Release.
      #
      # Strategy: we pre-create the release (with full release notes) when we
      # push the tag from the dev machine, BEFORE CI runs. CI then just uploads
      # the built artifacts to the existing release.
      #
      # Why `gh release upload` instead of `gh release create`?
      #   - `gh release create` fails if the release already exists (exit 1),
      #     which caused CI to fail even though all builds succeeded.
      #   - `gh release upload` is idempotent: it adds files to an existing
      #     release. If the release doesn't exist yet, we create it first.
      #
      # Stale artifact filter: the GitHub Actions artifact cache can contain
      # leftover files from old Cargo.lock runs (e.g. Junk_1.6.0_*). We filter
      # them out by only uploading files whose name contains the current tag.
      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Strip the leading 'v' to get the bare version number (e.g. 2.5.0)
          VERSION="${TAG#v}"
          echo "Uploading artifacts for tag: $TAG  version: $VERSION"

          # Only upload files that contain the current version string.
          # This filters out stale artifacts from previous Cargo cache entries.
          RELEASE_FILES=$(find dist/ -type f | grep "$VERSION" | sort | tr '\n' ' ')
          echo "Filtered release files: $RELEASE_FILES"

          if [ -z "$RELEASE_FILES" ]; then
            echo "ERROR: No release files found matching version $VERSION"
            exit 1
          fi

          # Create the release if it doesn't already exist, then upload.
          # --clobber overwrites any existing asset with the same name.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading artifacts"
            gh release upload "$TAG" $RELEASE_FILES --clobber
          else
            echo "Release $TAG does not exist — creating with artifacts"
            PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --oneline "$PREV_TAG..$TAG" | head -20)
            else
              CHANGELOG="Initial release"
            fi
            gh release create "$TAG" \
              --title "Junk $TAG" \
              --notes "$CHANGELOG" \
              $RELEASE_FILES
          fi

          echo "Done. Artifacts on release:"
          gh api /repos/paulfxyz/junk/releases/tags/$TAG --jq '.assets[] | .name'
