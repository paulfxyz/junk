<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>Junk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="window">
    <textarea
      id="pad"
      class="pad"
      placeholder="Start typing… or paste anything."
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    ></textarea>
    <div class="footer">
      <span class="hint"><kbd>⌘J</kbd> toggle &nbsp;·&nbsp; content auto-saved</span>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
